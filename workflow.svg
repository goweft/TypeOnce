<!-- ── flow arrows (indigo) ───────────────────────────────────── -->
<g stroke="#33476B" stroke-width="1.6" opacity="0.55">
  <line x1="189" y1="168" x2="218" y2="168" stroke-linecap="round"/>
  <line x1="383" y1="168" x2="412" y2="168" stroke-linecap="round"/>
  <line x1="577" y1="168" x2="606" y2="168" stroke-linecap="round"/>
</g>
<g fill="#33476B" opacity="0.7">
  <polygon points="223,168 215,164 215,172"/>
  <polygon points="417,168 409,164 409,172"/>
  <polygon points="611,168 603,164 603,172"/>
</g>

<!-- profiles feeder -> engine -->
<line x1="303" y1="86" x2="303" y2="118" stroke="#33476B" stroke-width="1.6" stroke-linecap="round" opacity="0.45"/>
<polygon points="303,122 299,114 307,114" fill="#33476B" opacity="0.6"/>

<!-- ── profiles.yml (feeds the engine) ────────────────────────── -->
<rect x="223" y="46" width="160" height="40" rx="6" fill="#F1EEE6" stroke="#D8CDB6" stroke-width="1"/>
<rect x="223" y="46" width="3.5" height="40" rx="1.75" fill="#33476B" opacity="0.42"/>
<text x="236" y="64" font-family="ui-monospace, monospace" font-size="12" fill="#3a4f78">profiles.yml</text>
<text x="236" y="78" font-family="system-ui, sans-serif" font-size="10" fill="#94897A">work · personal · ir</text>

<!-- ── Box 1: YAML packs (amber) ──────────────────────────────── -->
<rect x="29" y="120" width="160" height="96" rx="8" fill="#F7F2E8" stroke="#D8CDB6" stroke-width="1"/>
<rect x="29" y="120" width="4" height="96" rx="2" fill="#E2B86A" opacity="0.9"/>
