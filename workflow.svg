<text x="433" y="170" font-family="ui-monospace, monospace" font-size="11" fill="#6E6555">:8091 (Docker)</text>
<text x="433" y="185" font-family="ui-monospace, monospace" font-size="10.5" fill="#94897A">/expand · /triggers</text>
<text x="433" y="199" font-family="ui-monospace, monospace" font-size="10.5" fill="#94897A">/profiles · /health</text>

<!-- ── Box 4: Clients (rust) ──────────────────────────────────── -->
<rect x="611" y="120" width="160" height="96" rx="8" fill="#F7F2E8" stroke="#D8CDB6" stroke-width="1"/>
<rect x="611" y="120" width="4" height="96" rx="2" fill="#B5472E" opacity="0.8"/>
