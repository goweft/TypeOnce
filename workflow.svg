<text x="45" y="170" font-family="system-ui, sans-serif" font-size="11" fill="#6E6555">8 composable packs</text>
<text x="45" y="185" font-family="system-ui, sans-serif" font-size="11" fill="#94897A">essentials · dev · biz · it</text>
<text x="45" y="199" font-family="system-ui, sans-serif" font-size="11" fill="#94897A">personal · prod · ai-prompts</text>

<!-- ── Box 2: Engine (indigo) ─────────────────────────────────── -->
<rect x="223" y="120" width="160" height="96" rx="8" fill="#F7F2E8" stroke="#D8CDB6" stroke-width="1"/>
<rect x="223" y="120" width="4" height="96" rx="2" fill="#33476B" opacity="0.5"/>
<text x="239" y="150" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#221C14">Engine</text>
<text x="239" y="170" font-family="system-ui, sans-serif" font-size="11" fill="#6E6555">Mustache render</text>
<text x="239" y="185" font-family="system-ui, sans-serif" font-size="11" fill="#94897A">profile resolution</text>
<text x="239" y="199" font-family="system-ui, sans-serif" font-size="11" fill="#94897A">last-wins · raw passthrough</text>

<!-- ── Box 3: REST API (neutral) ──────────────────────────────── -->
<rect x="417" y="120" width="160" height="96" rx="8" fill="#F7F2E8" stroke="#D8CDB6" stroke-width="1"/>
<rect x="417" y="120" width="4" height="96" rx="2" fill="#3a4f78" opacity="0.42"/>
