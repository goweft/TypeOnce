<text x="627" y="170" font-family="system-ui, sans-serif" font-size="11" fill="#6E6555">Windows · AutoHotkey</text>
<text x="627" y="185" font-family="system-ui, sans-serif" font-size="11" fill="#94897A">macOS · rto</text>
<text x="627" y="199" font-family="system-ui, sans-serif" font-size="11" fill="#94897A">types into any app</text>

<!-- ── human caption ──────────────────────────────────────────── -->
<text x="400" y="256" font-family="Georgia, serif" font-size="14" fill="#6E6555" text-anchor="middle" font-style="italic">type <tspan font-family="ui-monospace, monospace" font-style="normal" fill="#8a6a36">;sig</tspan> in any app — get the full signature, rendered and pasted</text>

</svg>
