<!DOCTYPE html>
<html>
<head>
    <title>TypeOnce Web</title>
    <style>
        body { font-family: monospace; max-width: 600px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        input, button { padding: 10px; margin: 5px; font-size: 14px; }
        #result { 
            background: #f0f0f0; 
            padding: 15px; 
            margin-top: 20px; 
            white-space: pre-wrap;
            border-radius: 5px;
            min-height: 50px;
        }
        ul { list-style-type: none; padding: 0; }
        li { 
            background: #f9f9f9; 
            margin: 5px 0; 
            padding: 8px;
            border-radius: 3px;
            font-family: monospace;
        }
        .trigger-key { font-weight: bold; color: #0066cc; }
    </style>
</head>
<body>
    <h1>TypeOnce Text Expander</h1>
    <div>
        <input type="text" id="trigger" placeholder="Enter trigger (e.g., ;date)" style="width: 300px;">
        <button onclick="expand()">Expand</button>
    </div>
    <div id="result"></div>
    
    <h3>Available Triggers:</h3>
    <ul id="triggers">Loading triggers...</ul>
    
    <script>
        // Use relative path that works through Nginx proxy
        const API = '/typeonce';
        
        async function expand() {
            const trigger = document.getElementById('trigger').value;
            if (!trigger) {
                document.getElementById('result').innerText = 'Please enter a trigger';
                return;
            }
            
            try {
                const response = await fetch(`${API}/expand`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({trigger: trigger})
                });
                const data = await response.json();
                document.getElementById('result').innerText = 
                    data.success ? data.result : (data.error || 'Trigger not found');
            } catch (error) {
                document.getElementById('result').innerText = 'Error: ' + error.message;
            }
        }
        
        async function loadTriggers() {
            try {
                const response = await fetch(`${API}/triggers`);
                const triggers = await response.json();
                const list = document.getElementById('triggers');
                list.innerHTML = triggers.map(t => 
                    `<li><span class="trigger-key">${t.key}</span> - ${t.label || 'No description'}</li>`
                ).join('');
            } catch (error) {
                document.getElementById('triggers').innerHTML = 
                    '<li>Error loading triggers: ' + error.message + '</li>';
            }
        }
        
        // Load triggers on page load
        loadTriggers();
        
        // Allow Enter key to trigger expansion
        document.getElementById('trigger').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') expand();
        });
    </script>
</body>
</html>
