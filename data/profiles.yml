# Role-based profiles. Each profile activates a subset of packs (by pack `id`),
# so the same trigger can resolve differently per context. Profiles are designed
# to be internally collision-free: e.g. `work` gets ;sig from biz.communication,
# while `personal` gets it from typeonce.essentials.
#
# The AI helper packs collide with nothing, so they're listed in every profile to
# keep them available in any context:
#   ai.prompts     -> ;ai*   task prompts
#   ai.promptcraft -> ;cp*   prompt-engineering scaffolds
#   ai.copilot     -> ;gc*   VS Code GitHub Copilot Chat prompts
#   ai.appbuilder  -> ;app*  build-an-app-from-scratch prompts
#
# Note: the personal.quick pack (data/packs/personal.yml) is kept local-only and
# is not published, so it is intentionally not referenced here.
#
# With no profile active (PROFILE unset and this file absent), all packs are
# eligible and behavior is identical to the pre-profiles engine.
default: work

profiles:
  work:
    description: Work / IT
    packs: [biz.communication, it.support, dev.toolkit, prod.shortcuts, ai.prompts, ai.promptcraft, ai.copilot, ai.appbuilder]
  personal:
    description: Personal
    packs: [custom.personal, typeonce.essentials, ai.prompts, ai.promptcraft, ai.copilot, ai.appbuilder]
  ir:
    description: Incident response
    packs: [it.support, dev.toolkit, ai.prompts, ai.promptcraft, ai.copilot, ai.appbuilder]   # expand as security packs land
