id: "ai.appbuilder"
name: "App-from-Scratch Prompts"
version: "0.1.0"
description: "Model-agnostic prompts for building a new application from scratch — plan first, choose a stack deliberately, then scaffold in reviewable stages. Fill in the bracketed parts."

triggers:
  - key: ";appplan"
    label: "Plan an app before building"
    action:
      type: "text"
      raw: true
      template: |
        You are a senior software architect helping me plan a new application before any code is written.

        What I want to build: [one-paragraph description + who it's for]
        Hard requirements: [must-haves]
        Constraints: [stack preferences, budget, scale, timeline, team size, deployment target, compliance]

        First, ask me up to [3] clarifying questions about anything ambiguous, then wait for my answers. After that, produce:
        1. A short summary of what we're building and the core user flows.
        2. A recommended approach with the main components and a sketch of the data model.
        3. A phased build plan where each milestone is independently runnable and testable.
        4. The key design decisions with their tradeoffs, and the top risks or unknowns.
        Don't write application code yet — this is the plan.

  - key: ";appstack"
    label: "Choose a tech stack (with tradeoffs)"
    action:
      type: "text"
      raw: true
      template: |
        Help me choose a tech stack for this project. Don't pick one silently — show the tradeoffs.

        Project: [what you're building]
        Priorities: [e.g. speed to ship, scale, team familiarity, cost, hiring, long-term maintenance]
        Constraints: [existing infra, language preferences, deployment target, must-use / must-avoid]

        Recommend 1-2 stacks (frontend, backend, database, hosting, key libraries). For each, give a one-line rationale and a tradeoff note covering learning curve, ecosystem maturity, scalability, and operational cost. Pick a default and explain why. Flag anything in my requirements that decisively pushes the choice one way. Be concrete — name specific frameworks and versions.

  - key: ";appnew"
    label: "Scaffold a new app from scratch (staged)"
    action:
      type: "text"
      raw: true
      template: |
        You are helping me build a new application from scratch. Build it in stages and stop for my review after each stage — do not generate the whole app in one shot.

        What I'm building: [description + core features + who it's for]
        Stack: [exact stack — language, framework, database, styling, key libraries + versions; or write: "recommend a stack and confirm with me before starting"]
        Constraints: [auth approach, data/storage, file and folder structure, no unnecessary dependencies, target platform, testing expectations]

        Stage 0 (plan): Restate the goal in your own words, list your assumptions, ask up to [3] clarifying questions, and propose the project structure and the build stages. Then wait for my go-ahead.

        Stage 1 (skeleton): Once I confirm, build a minimal runnable skeleton — project setup, entry point, and one end-to-end path through the whole stack (a "hello world" that actually runs). Give me the exact setup and run commands, and how to verify it works before we add features.

        Throughout: follow consistent conventions, keep each change scoped to the current stage, prefer the standard library and the dependencies I named over adding new ones, and flag anything risky or irreversible before doing it.
