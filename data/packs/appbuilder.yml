id: "ai.appbuilder"
name: "App-from-Scratch Prompts"
version: "0.1.0"
description: "Model-agnostic prompts for building a new application from scratch — plan first, choose a stack deliberately, then scaffold in reviewable stages. All three prompt you for their inputs."

triggers:
  - key: ";appplan"
    label: "Plan an app before building"
    inputs:
      - name: description
        prompt: "What do you want to build? (one paragraph + who it's for)"
        required: true
        default: "[one-paragraph description + who it's for]"
      - name: requirements
        prompt: "Hard requirements / must-haves"
        type: multiline
        default: "the essential must-haves"
      - name: constraints
        prompt: "Constraints (stack, budget, scale, timeline, team, deployment, compliance)"
        type: multiline
        default: "no hard constraints — recommend sensible defaults"
      - name: questions
        prompt: "Max clarifying questions before planning"
        type: number
        default: 3
    action:
      type: "text"
      template: |
        You are a senior software architect helping me plan a new application before any code is written.

        What I want to build: {{inputs.description}}
        Hard requirements: {{inputs.requirements}}
        Constraints: {{inputs.constraints}}

        First, ask me up to {{inputs.questions}} clarifying questions about anything ambiguous, then wait for my answers. After that, produce:
        1. A short summary of what we're building and the core user flows.
        2. A recommended approach with the main components and a sketch of the data model.
        3. A phased build plan where each milestone is independently runnable and testable.
        4. The key design decisions with their tradeoffs, and the top risks or unknowns.
        Don't write application code yet — this is the plan.

  - key: ";appstack"
    label: "Choose a tech stack (with tradeoffs)"
    inputs:
      - name: project
        prompt: "What are you building?"
        required: true
        default: "[what you're building]"
      - name: priorities
        prompt: "Priorities (speed to ship, scale, team familiarity, cost, hiring, maintenance)"
        type: multiline
        default: "balanced — speed to ship and long-term maintainability"
      - name: constraints
        prompt: "Constraints (existing infra, language prefs, deployment target, must-use / must-avoid)"
        type: multiline
        default: "no hard constraints"
    action:
      type: "text"
      template: |
        Help me choose a tech stack for this project. Don't pick one silently — show the tradeoffs.

        Project: {{inputs.project}}
        Priorities: {{inputs.priorities}}
        Constraints: {{inputs.constraints}}

        Recommend 1-2 stacks (frontend, backend, database, hosting, key libraries). For each, give a one-line rationale and a tradeoff note covering learning curve, ecosystem maturity, scalability, and operational cost. Pick a default and explain why. Flag anything in my requirements that decisively pushes the choice one way. Be concrete — name specific frameworks and versions.

  - key: ";appnew"
    label: "Scaffold a new app from scratch (staged)"
    inputs:
      - name: description
        prompt: "What are you building? (core features + who it's for)"
        required: true
        default: "[what you're building — features + who it's for]"
      - name: stack
        prompt: "Stack (language/framework/db/styling + versions; blank to let the model choose)"
        default: "recommend a stack and confirm with me before starting"
      - name: constraints
        prompt: "Constraints (auth, storage, file structure, deps, platform, testing)"
        type: multiline
        default: "follow sensible defaults and tell me what you chose"
      - name: questions
        prompt: "Max clarifying questions before building"
        type: number
        default: 3
    action:
      type: "text"
      template: |
        You are helping me build a new application from scratch. Build it in stages and stop for my review after each stage — do not generate the whole app in one shot.

        What I'm building: {{inputs.description}}
        Stack: {{inputs.stack}}
        Constraints: {{inputs.constraints}}

        Stage 0 (plan): Restate the goal in your own words, list your assumptions, ask up to {{inputs.questions}} clarifying questions, and propose the project structure and the build stages. Then wait for my go-ahead.

        Stage 1 (skeleton): Once I confirm, build a minimal runnable skeleton — project setup, entry point, and one end-to-end path through the whole stack (a "hello world" that actually runs). Give me the exact setup and run commands, and how to verify it works before we add features.

        Throughout: follow consistent conventions, keep each change scoped to the current stage, prefer the standard library and the dependencies I named over adding new ones, and flag anything risky or irreversible before doing it.
