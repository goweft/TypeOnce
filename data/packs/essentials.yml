id: "typeonce.essentials"
name: "Essential Snippets"
version: "0.1.0"
description: "Common text expansions"

vars:
  company: "ACME Corp"
  email: "user@example.com"

triggers:
  - key: ";date"
    label: "Current date"
    action:
      type: "text"
      template: "{{date}}"
  
  - key: ";time"
    label: "Current time"
    action:
      type: "text"
      template: "{{time}}"
  
  - key: ";sig"
    label: "Email signature"
    action:
      type: "text"
      template: |
        Best regards,
        {{user}}
        {{vars.company}}
  
  - key: ";uuid"
    label: "Generate UUID"
    action:
      type: "text"
      template: "{{uuid}}"
