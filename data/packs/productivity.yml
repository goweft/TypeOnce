id: "prod.shortcuts"
name: "Productivity Shortcuts"
version: "0.1.0"
description: "Quick productivity boosters and templates"

triggers:
  - key: ";task"
    label: "Task template"
    inputs:
      - name: description
        prompt: "Task description"
        required: true
        default: "what needs doing"
      - name: due
        prompt: "Due (date)"
        default: "this week"
      - name: priority
        prompt: "Priority (1 = highest)"
        type: select
        options: ["1", "2", "3", "4", "5"]
        default: "3"
    action:
      type: "text"
      template: "[ ] Task: {{inputs.description}} | Due: {{inputs.due}} | Priority: {{inputs.priority}}"
  
  - key: ";note"
    label: "Quick note"
    action:
      type: "text"
      template: |
        📝 Note - {{datetime}}
        Topic: 
        Details: 
        Action items:
  
  - key: ";week"
    label: "Weekly plan template"
    action:
      type: "text"
      template: |
        Week of {{date}}
        
        Monday:
        - [ ] 
        
        Tuesday:
        - [ ] 
        
        Wednesday:
        - [ ] 
        
        Thursday:
        - [ ] 
        
        Friday:
        - [ ] 
  
  - key: ";report"
    label: "Status report"
    action:
      type: "text"
      template: |
        Status Report - {{date}}
        
        Completed:
        • 
        
        In Progress:
        • 
        
        Blocked:
        • 
        
        Next Steps:
        • 
  
  - key: ";idea"
    label: "Idea capture"
    action:
      type: "text"
      template: |
        💡 IDEA: 
        Context: 
        Potential impact: 
        Next action: 
        Captured: {{datetime}}
  
  - key: ";focus"
    label: "Focus block"
    inputs:
      - name: end
        prompt: "Focus block end time"
        default: "+90 min"
    action:
      type: "text"
      template: |
        🎯 FOCUS BLOCK
        Time: {{time}} - {{inputs.end}}
        Task: 
        Goal: 
        Distractions off: ✓
