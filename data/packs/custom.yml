id: "custom.personal"
name: "Personal Shortcuts"
version: "0.1.0"
description: "My custom expansions"

vars:
  name: "Gostev"
  project: "TypeOnce"

triggers:
  - key: ";gh"
    label: "GitHub commit"
    action:
      type: "text"
      template: "git commit -m 'feat: TypeOnce - '"

  - key: ";ip"
    label: "Server IP"
    action:
      type: "text"
      template: "192.168.7.130"

  - key: ";docker"
    label: "Docker ps command"
    action:
      type: "text"
      raw: true
      template: "sudo docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'"
